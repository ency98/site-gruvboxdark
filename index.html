<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="icon" href="assets/favicon.ico" />
    <link rel="stylesheet" href="css/style.css" />
    <title>Gruvbox-Dark Color Palette</title>
    <meta name="description"
        content="Gruvbox-Dark color palette created by glenntatum that consists #8ec07c,#458588,#d79921,#cc241d,#3c3836 colors." />
</head>

<body>
    <div class="container">
        <div class="row full-row">
            <div class="col-md-6">
                <h1>Gruvbox-Dark (Simplified) Color Palette</h1>
                <div class="palette-container">
                    <div class="palette-color-block" title="#8ec07c" style="background-color:#8ec07c">
                    </div>
                    <div class="palette-color-block" title="#458588" style="background-color:#458588">
                    </div>
                    <div class="palette-color-block" title="#d79921" style="background-color:#d79921">
                    </div>
                    <div class="palette-color-block" title="#cc241d" style="background-color:#cc241d">
                    </div>
                    <div class="palette-color-block" title="#3c3836" style="background-color:#3c3836">
                    </div>
                    <div class="clearfix"></div>
                </div>
            </div>
            <p>
                <a href="images/gruvbox-dark.png">Download Pallete PNG</a>
            </p>
            <div class="col-md-6">
                <h2>Colors in Palette</h2>
                <table class="table">
                    <tr>
                        <th>Color</th>
                        <th>Hex</th>
                        <th>RGB</th>
                    </tr>
                    <tr>
                        <td style="background-color:#8ec07c"></td>
                        <td><a href="https://www.color-hex.com/color/8ec07c" title="#8ec07c color">#8ec07c</a></td>
                        <td>(142,192,124)</td>
                    </tr>
                    <tr>
                        <td style="background-color:#458588"></td>
                        <td><a href="https://www.color-hex.com/color/458588" title="#458588 color">#458588</a></td>
                        <td>(69,133,136)</td>
                    </tr>
                    <tr>
                        <td style="background-color:#d79921"></td>
                        <td><a href="https://www.color-hex.com/color/d79921" title="#d79921 color">#d79921</a></td>
                        <td>(215,153,33)</td>
                    </tr>
                    <tr>
                        <td style="background-color:#cc241d"></td>
                        <td><a href="https://www.color-hex.com/color/cc241d" title="#cc241d color">#cc241d</a></td>
                        <td>(204,36,29)</td>
                    </tr>
                    <tr>
                        <td style="background-color:#3c3836"></td>
                        <td><a href="https://www.color-hex.com/color/3c3836" title="#3c3836 color">#3c3836</a></td>
                        <td>(60,56,54)</td>
                    </tr>
                </table>
            </div>
        </div>
    </div>
    <footer class="site-footer">
        <nav class="footer-links" aria-label="Footer links">
            <a href="https://www.color-hex.com/color-palette/1026676" target="_blank" rel="noopener noreferrer">
                Original palette on color-hex.com
            </a>
            <a href="https://github.com/ency98/site-gruvboxdark" target="_blank" rel="noopener noreferrer">
                Project repository on GitHub
            </a>
        </nav>
    </footer>
    <div id="copy-feedback" class="copy-feedback" aria-live="polite"></div>
    <script>
        (function () {
            var feedback = document.getElementById("copy-feedback");
            var feedbackTimer = null;


            function firstHex(text) {
                if (!text) return null;
                var match = text.match(/#?[0-9a-fA-F]{6}/);
                if (!match) return null;
                return (match[0].startsWith("#") ? match[0] : "#" + match[0]).toLowerCase();
            }

            function showFeedback(message) {
                if (!feedback) return;

                feedback.textContent = message;
                feedback.classList.add("is-visible");

                if (feedbackTimer) {
                    clearTimeout(feedbackTimer);
                }

                feedbackTimer = setTimeout(function () {
                    feedback.classList.remove("is-visible");
                }, 1200);
            }

            function hexFromElement(element) {
                if (!element || element.nodeType !== 1) return null;

                var fromData = firstHex(element.getAttribute("data-hex"));
                if (fromData) return fromData;

                var fromTitle = firstHex(element.getAttribute("title"));
                if (fromTitle) return fromTitle;

                var fromStyle = firstHex(element.getAttribute("style"));
                if (fromStyle) return fromStyle;

                if (element.tagName === "A") {
                    var fromHref = firstHex(element.getAttribute("href"));
                    if (fromHref) return fromHref;
                }

                var fromText = firstHex(element.textContent);
                if (fromText) return fromText;

                return null;
            }

            function findAssociatedHex(target) {
                var current = target;
                while (current && current !== document.body) {
                    var direct = hexFromElement(current);
                    if (direct) return direct;

                    if (current.tagName === "TR") {
                        var rowHexCell = current.querySelector('a[href*="/color/"], a[title*="#"], td[style*="#"], [title*="#"]');
                        var rowHex = hexFromElement(rowHexCell);
                        if (rowHex) return rowHex;
                    }

                    current = current.parentElement;
                }
                return null;
            }

            function copyText(text) {
                if (navigator.clipboard && navigator.clipboard.writeText) {
                    return navigator.clipboard.writeText(text);
                }

                return new Promise(function (resolve, reject) {
                    var textarea = document.createElement("textarea");
                    textarea.value = text;
                    textarea.setAttribute("readonly", "");
                    textarea.style.position = "absolute";
                    textarea.style.left = "-9999px";
                    document.body.appendChild(textarea);
                    textarea.select();
                    try {
                        var ok = document.execCommand("copy");
                        document.body.removeChild(textarea);
                        ok ? resolve() : reject(new Error("copy failed"));
                    } catch (error) {
                        document.body.removeChild(textarea);
                        reject(error);
                    }
                });
            }

            document.addEventListener("click", function (event) {
                var hex = findAssociatedHex(event.target);
                if (!hex) return;

                copyText(hex)
                    .then(function () {
                        showFeedback("Copied " + hex);
                    })
                    .catch(function () {
                        showFeedback("Unable to copy");
                    });
            });
        })();
    </script>
</body>

</html>

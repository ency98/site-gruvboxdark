<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="icon" href="favicon.ico" />
    <link rel="stylesheet" href="style.css" />
    <title>Gruvbox-Dark Color Palette</title>
    <meta name="description"
        content="Gruvbox-Dark color palette created by glenntatum that consists #8ec07c,#458588,#d79921,#cc241d,#3c3836 colors." />
</head>

<body>
    <div class="container">
        <div class="row fullrow">
            <div class="col-md-6">
                <h1>Gruvbox-Dark (Simplified) Color Palette</h1>
                <div class="palettecontainer">
                    <div class="palettecolordivc" title="#8ec07c" style="background-color:#8ec07c">
                    </div>
                    <div class="palettecolordivc" title="#458588" style="background-color:#458588">
                    </div>
                    <div class="palettecolordivc" title="#d79921" style="background-color:#d79921">
                    </div>
                    <div class="palettecolordivc" title="#cc241d" style="background-color:#cc241d">
                    </div>
                    <div class="palettecolordivc" title="#3c3836" style="background-color:#3c3836">
                    </div>
                    <div class="clearfix"></div>
                </div>
            </div>
            <div class="col-md-6">
                <h2>Colors in Palette</h2>
                <table class="table">
                    <tr>
                        <th>Color</th>
                        <th>Hex</th>
                        <th>RGB</th>
                    </tr>
                    <tr>
                        <td style="background-color:#8ec07c"></td>
                        <td><a href="https://www.color-hex.com/color/8ec07c" title="#8ec07c color">#8ec07c</a></td>
                        <td>(142,192,124)</td>
                    </tr>
                    <tr>
                        <td style="background-color:#458588"></td>
                        <td><a href="https://www.color-hex.com/color/458588" title="#458588 color">#458588</a></td>
                        <td>(69,133,136)</td>
                    </tr>
                    <tr>
                        <td style="background-color:#d79921"></td>
                        <td><a href="https://www.color-hex.com/color/d79921" title="#d79921 color">#d79921</a></td>
                        <td>(215,153,33)</td>
                    </tr>
                    <tr>
                        <td style="background-color:#cc241d"></td>
                        <td><a href="https://www.color-hex.com/color/cc241d" title="#cc241d color">#cc241d</a></td>
                        <td>(204,36,29)</td>
                    </tr>
                    <tr>
                        <td style="background-color:#3c3836"></td>
                        <td><a href="https://www.color-hex.com/color/3c3836" title="#3c3836 color">#3c3836</a></td>
                        <td>(60,56,54)</td>
                    </tr>
                </table>
            </div>
        </div>
    </div>
</body>

</html>
